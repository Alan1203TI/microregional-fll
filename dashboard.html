<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Placar ao Vivo - FLL 2026</title>
  <link rel="stylesheet" href="style.css?v=20260702-sem-corte">
</head>
<body class="championship-body unified-dashboard vivid-dashboard" data-table-id="GERAL" data-table-name="Geral">
  <div class="arena-bg"></div>

  <header class="scoreboard-header">
    <div class="event-brand">
      <div class="logo-card">
        <img src="./assets/bioglow-logo.png?v=4" alt="BIOGLOW">
      </div>
      <div>
        <strong>MICRORREGIONAL MG 2026</strong>
        <span>Desempenho do Robô • BIOGLOW</span>
      </div>
    </div>

    <div class="live-pill"><span></span> AO VIVO</div>

    <div class="header-actions">
      <a href="pontuacao-mesa1.html">Mesa 1</a>
      <a href="pontuacao-mesa2.html">Mesa 2</a>
      <a href="admin.html">Admin</a>
    </div>
  </header>

  <main class="championship-dashboard unified-layout vivid-layout tv-scoreboard-layout">
    <section class="tv-scoreboard-titlebar">
      <div class="tv-title-left">
        <p class="eyebrow">DASHBOARD AO VIVO</p>
        <h1>DESEMPENHO DO ROBÔ</h1>
      </div>
      <div class="tv-title-right">
        <strong id="dashboardClock">--:--:--</strong>
        <span>Atualização automática</span>
      </div>
    </section>

    <section class="rounds-scoreboard vivid-rounds dashboard-results-only tv-scoreboard-panel">
      <div class="panel-title tv-panel-title">
        <h2>RESULTADOS</h2>
        <span>Round Teste e Round Oficial 1</span>
      </div>

      <div class="table-wrap tv-table-wrap">
        <table class="champ-table tv-score-table">
          <thead>
            <tr>
              <th class="pos-col">#</th>
              <th>Equipe</th>
              <th>Round Teste</th>
              <th>Round Oficial 1</th>
            </tr>
          </thead>
          <tbody id="roundsBody"></tbody>
        </table>
      </div>
    </section>
  </main>

  <script type="module" src="visual-settings.js?v=20260619-ajustes"></script>
  <script type="module" src="dashboard.js?v=20260702-sem-corte"></script>
</body>
</html>
