<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Pontuação Mesa 1 - FLL 2026</title>
  <link rel="stylesheet" href="style.css">
</head>
<body data-table-id="mesa1" data-table-name="Mesa 1">
  <header class="topbar">
    <div class="brand">
      <div class="logo"><img src="assets/bioglow-logo.png" alt="BIOGLOW"></div>
      <div>
        <div>Pontuação Desafio do Robô - Mesa 1</div>
        <small>Microrregional FLL 2026</small>
      </div>
    </div>

    <nav class="nav">
      <a href="pontuacao-mesa1.html">Pontuação Mesa 1</a>
      <a href="pontuacao-mesa2.html">Pontuação Mesa 2</a>
      <a href="dashboard.html" target="_blank">Dashboard Geral</a>
      <a href="admin.html">Admin</a>
    </nav>
  </header>

  <main class="container">
    <div class="grid">
      <section>
        <div class="card">
          <h2>Lançamento de pontuação - Mesa 1</h2>

          <div class="setup">
            <div class="field">
              <label>Equipe</label>
              <select id="teamSelect"></select>
            </div>

            <div class="field">
              <label>Round</label>
              <select id="roundSelect">
                <option value="TESTE">TESTE</option>
                <option value="1">ROUND 1</option>
                <option value="2">ROUND 2</option>
              </select>
            </div>

            <div class="field">
              <label>Juiz</label>
              <input id="judgeInput" placeholder="Nome do juiz">
            </div>
          </div>
        </div>

        <div id="missions"></div>
      </section>

      <aside>
        <div class="card judge-control-panel judge-control-horizontal">
          <div class="judge-context">
            <span>Mesa atual</span>
            <strong id="currentTableDisplay">Mesa 1</strong>
            <span>Equipe atual</span>
            <strong id="currentTeamDisplay">Selecione uma equipe</strong>
            <small id="currentRoundDisplay">Round TESTE</small>
          </div>

          <div class="judge-main-row">
            <div class="judge-timer-area">
              <h3>Cronômetro</h3>
              <div class="judge-timer-display" id="judgeTimerDisplay">02:30</div>
              <div class="judge-timer-status" id="judgeTimerStatus">Parado</div>
            </div>

            <div class="judge-score-area">
              <h3>Pontuação</h3>
              <div class="score judge-score"><span id="totalScore">0</span></div>
              <strong>PONTOS</strong>
            </div>
          </div>

          <div class="judge-timer-actions">
            <button class="btn primary" id="judgeStartTimer">Iniciar</button>
            <button class="btn" id="judgePauseTimer">Pausar</button>
            <button class="btn red" id="judgeResetTimer">Reiniciar</button>
          </div>

          <button class="btn red full-btn" id="clearBtn">Limpar marcação</button>
        </div>
      </aside>
    </div>
  </main>

  <div class="footer-actions">
    <button class="btn primary" id="saveBtn">Salvar resultado</button>
    <button class="btn" id="newBtn">Novo lançamento</button>
  </div>

  <div class="toast" id="toast"></div>

  <script type="module" src="visual-settings.js"></script>
  <script type="module" src="app.js"></script>
</body>
</html>
